<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A solid Tbilisi skyline silhouette on near-black, lit from behind by a soft gold horizon, with the Mtatsminda TV tower, sulfur bath domes, Narikala fortress and the Mother of Georgia statue, beneath a sparse field of twinkling gold stars.</desc>


