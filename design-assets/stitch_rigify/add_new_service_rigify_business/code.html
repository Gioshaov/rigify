<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Rigify - Add New Service</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #131318;
        }
        ::-webkit-scrollbar-thumb {
            background: #1b1b20;
            border: 2px solid #131318;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2a292f;
        }
        /* Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e4e1e9",
                        "on-secondary-fixed-variant": "#464651",
                        "on-tertiary-fixed-variant": "#2f4576",
                        "primary-fixed": "#ffe08f",
                        "on-tertiary": "#162f5e",
                        "inverse-on-surface": "#303036",
                        "primary": "#ffe090",
                        "on-secondary": "#302f3a",
                        "text-secondary": "#a1a1aa",
                        "text-primary": "#ffffff",
                        "background": "#131318",
                        "surface-container-low": "#1b1b20",
                        "on-secondary-fixed": "#1b1b25",
                        "tertiary-fixed-dim": "#b0c6ff",
                        "surface-tint": "#e6c364",
                        "on-primary-fixed-variant": "#584400",
                        "surface-elevated": "#22222e",
                        "on-tertiary-container": "#3b5183",
                        "tertiary": "#d9e2ff",
                        "on-tertiary-fixed": "#001944",
                        "surface-container-high": "#2a292f",
                        "surface-container": "#1f1f25",
                        "outline": "#99907e",
                        "on-primary-fixed": "#241a00",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0e0e13",
                        "inverse-primary": "#755b00",
                        "primary-container": "#e6c364",
                        "secondary-fixed": "#e3e1ef",
                        "tertiary-fixed": "#d9e2ff",
                        "secondary-fixed-dim": "#c7c5d3",
                        "on-primary": "#3d2e00",
                        "secondary": "#c7c5d3",
                        "secondary-container": "#494853",
                        "primary-fixed-dim": "#e6c364",
                        "surface-container-highest": "#35343a",
                        "surface": "#131318",
                        "muted-gold": "#9d8653",
                        "error-container": "#93000a",
                        "on-surface": "#e4e1e9",
                        "surface-dim": "#131318",
                        "error": "#ffb4ab",
                        "surface-bright": "#39383e",
                        "outline-variant": "#4d4637",
                        "pure-white": "#ffffff",
                        "inverse-surface": "#e4e1e9",
                        "on-surface-variant": "#d0c5b2",
                        "on-primary-container": "#665000",
                        "tertiary-container": "#b0c6ff",
                        "surface-variant": "#35343a",
                        "on-secondary-container": "#b9b7c4",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "base": "8px",
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "label-mono-xs": ["JetBrains Mono"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-mono-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-mono-xs": ["10px", {"lineHeight": "1.0", "letterSpacing": "0.2em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-mono-sm": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-x-hidden antialiased">
<!-- Top Bar Component -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-white/10">
<div class="flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<button aria-label="Go Back" class="active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg text-headline-md text-primary tracking-tight">ADD NEW SERVICE</h1>
</div>
<button class="font-label-mono-sm text-label-mono-sm text-on-surface-variant hover:text-primary transition-colors duration-200 active:scale-95">
                CANCEL
            </button>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile md:px-margin-desktop max-w-2xl mx-auto">
<form class="space-y-12">
<!-- Hero Upload Section -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-label-mono-sm text-label-mono-sm text-primary tracking-widest uppercase">Service Image</h2>
<span class="font-label-mono-xs text-label-mono-xs text-on-surface-variant">REQUIRED</span>
</div>
<label class="group relative flex flex-col items-center justify-center h-64 w-full bg-surface-container-low border border-white/10 hover:border-primary/50 transition-colors cursor-pointer overflow-hidden">
<input accept="image/*" class="hidden" type="file">
<!-- Decorative background element for the upload area -->
<div class="absolute inset-0 opacity-10 pointer-events-none">

</div>
<div class="relative z-10 flex flex-col items-center space-y-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="add_a_photo">add_a_photo</span>
<div class="text-center">
<p class="font-headline-md text-body-lg">Upload high-resolution image</p>
<p class="font-label-mono-xs text-label-mono-xs mt-1">PNG, JPG up to 10MB (4:5 ratio recommended)</p>
</div>
</div>
<!-- Simulated Hover Reveal -->
<div class="absolute bottom-4 right-4 bg-primary text-background px-3 py-1 font-label-mono-xs text-label-mono-xs opacity-0 group-hover:opacity-100 transition-opacity">
                        BROWSE FILES
                    </div>
</label>
</section>
<!-- Form Fields Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Service Name -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-mono-sm text-label-mono-sm text-on-surface-variant" for="service-name">SERVICE NAME</label>
<input class="w-full bg-surface-container-low border border-white/10 px-4 py-4 text-on-background focus:outline-none focus:border-primary transition-colors rounded-none placeholder:text-on-surface-variant/30 font-body-lg text-body-lg" id="service-name" placeholder="e.g. Signature Charcoal Beard Trim" type="text">
</div>
<!-- Category Dropdown -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-mono-sm text-label-mono-sm text-on-surface-variant" for="category">CATEGORY</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border border-white/10 px-4 py-4 text-on-background focus:outline-none focus:border-primary transition-colors rounded-none font-body-lg text-body-lg cursor-pointer" id="category">
<option disabled="" selected="" value="">Select a service category</option>
<option value="barber">Barbering &amp; Grooming</option>
<option value="spa">Luxury Spa Treatments</option>
<option value="skin">Clinical Skincare</option>
<option value="massage">Therapeutic Massage</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Description -->
<div class="col-span-1 md:col-span-2 space-y-2">
<label class="font-label-mono-sm text-label-mono-sm text-on-surface-variant" for="description">DESCRIPTION</label>
<textarea class="w-full bg-surface-container-low border border-white/10 px-4 py-4 text-on-background focus:outline-none focus:border-primary transition-colors rounded-none resize-none placeholder:text-on-surface-variant/30 font-body-lg text-body-lg" id="description" placeholder="Detail the luxury experience, techniques, and products used..." rows="4"></textarea>
</div>
<!-- Duration -->
<div class="space-y-2">
<label class="font-label-mono-sm text-label-mono-sm text-on-surface-variant" for="duration">DURATION (MINUTES)</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-white/10 px-4 py-4 text-on-background focus:outline-none focus:border-primary transition-colors rounded-none placeholder:text-on-surface-variant/30 font-body-lg text-body-lg" id="duration" placeholder="45" type="number">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="schedule">schedule</span>
</div>
</div>
</div>
<!-- Price -->
<div class="space-y-2">
<label class="font-label-mono-sm text-label-mono-sm text-on-surface-variant" for="price">PRICE (GEL)</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-white/10 px-4 py-4 text-on-background focus:outline-none focus:border-primary transition-colors rounded-none placeholder:text-on-surface-variant/30 font-body-lg text-body-lg pl-14" id="price" placeholder="0.00" type="number">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="font-label-mono-sm text-primary">GEL</span>
</div>
</div>
</div>
</section>
<!-- Advanced Options Toggle -->
<div class="pt-8 border-t border-white/10">
<button class="flex items-center justify-between w-full group" type="button">
<span class="font-label-mono-sm text-label-mono-sm text-on-surface-variant group-hover:text-primary transition-colors">ADVANCED SERVICE SETTINGS</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-transform group-hover:translate-x-1" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</form>
</main>
<!-- Sticky Bottom Action Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-container-low border-t border-white/10">
<div class="max-w-2xl mx-auto px-margin-mobile py-6">
<button class="w-full bg-primary text-on-primary py-5 font-headline-md text-headline-md tracking-tight active:scale-[0.98] transition-all hover:bg-primary-fixed duration-300 flex items-center justify-center gap-3">
<span>CREATE SERVICE</span>
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
</div>
</footer>
<!-- Script for handling micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Price input GEL label focus effect
            const priceInput = document.getElementById('price');
            const priceLabel = priceInput?.previousElementSibling;
            
            priceInput?.addEventListener('focus', () => {
                priceInput.parentElement.querySelector('span').classList.replace('text-on-surface-variant', 'text-primary');
            });

            priceInput?.addEventListener('blur', () => {
                priceInput.parentElement.querySelector('span').classList.replace('text-primary', 'text-on-surface-variant');
            });

            // Back button click simulation
            const backBtn = document.querySelector('[data-icon="arrow_back"]').parentElement;
            backBtn?.addEventListener('click', () => {
                console.log('Navigating back...');
            });
        });
    </script>
</body></html>
