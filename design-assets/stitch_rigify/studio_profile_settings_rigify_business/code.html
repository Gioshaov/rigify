<button class="flex-1 md:px-12 py-4 font-label-mono-sm border border-white/20 text-on-surface hover:bg-white/5 transition-colors uppercase">Discard</button>
<button class="flex-1 md:px-12 py-4 bg-primary text-on-primary font-headline-md font-bold hover:bg-primary-container active:scale-95 transition-all shadow-lg shadow-primary/20">SAVE CHANGES</button>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('gold-glow');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('gold-glow');
            });
        });

        // Toggle Switch Animation Logic
        document.querySelectorAll('button[onclick]').forEach(btn => {
            btn.addEventListener('click', function() {
                const dot = this.querySelector('div');
                if (this.classList.contains('bg-primary')) {
                    dot.style.transform = 'translateX(24px)';
                } else {
                    dot.style.transform = 'translateX(0px)';
                }
            });
        });
    </script>


</body></html>
