<!-- Micro-interaction Scripts -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });

        // Simple feedback for save changes button
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', () => {
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span>Processing...</span>';
            setTimeout(() => {
                saveBtn.innerHTML = '<span>Profile Updated</span><span class="material-symbols-outlined">verified</span>';
                saveBtn.classList.replace('bg-primary', 'bg-green-600');
                setTimeout(() => {
                    saveBtn.innerHTML = originalText;
                    saveBtn.classList.replace('bg-green-600', 'bg-primary');
                }, 2000);
            }, 1000);
        });
    </script>
