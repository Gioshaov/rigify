<style>
        body {
            background-color: #131319;
            color: #e4e1eb;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .orb-glow {
            filter: drop-shadow(0 0 30px rgba(230, 195, 100, 0.3)) drop-shadow(0 0 60px rgba(164, 201, 255, 0.2));
            animation: pulse-glow 4s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .activity-light {
            background: radial-gradient(circle, rgba(164, 201, 255, 0.15) 0%, transparent 70%);
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(230, 195, 100, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer-anim 2s infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>

<body class="font-body-md text-body-md h-screen flex flex-col items-center justify-between">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-gradient-to-b from-background/80 to-transparent backdrop-blur-md">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors Active: scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">close</span>
</button>
<div class="text-headline-md font-headline-md font-bold text-primary">Salome AI</div>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors Active: scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">minimize</span>
</button>
</header>
<!-- Main Atmospheric Content -->
<main class="flex-1 w-full flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Ambient Glows -->
<div class="activity-light -top-1/4 -left-1/4"></div>
<div class="activity-light -bottom-1/4 -right-1/4" style="background: radial-gradient(circle, rgba(166, 123, 255, 0.1) 0%, transparent 70%);"></div>
<!-- The Immersive Orb -->
<div class="relative z-10 flex flex-col items-center gap-12 max-w-lg px-margin-mobile text-center">
<div class="relative w-64 h-64 md:w-80 md:h-80 orb-glow">

<!-- Visual Waveform Micro-Interaction -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-full h-24 flex items-center justify-around px-8 opacity-40">
<div class="h-12 w-1 bg-primary rounded-full animate-[bounce_1.2s_infinite]"></div>
<div class="h-16 w-1 bg-tertiary-container rounded-full animate-[bounce_1s_infinite]"></div>
<div class="h-8 w-1 bg-primary-container rounded-full animate-[bounce_1.5s_infinite]"></div>
<div class="h-20 w-1 bg-secondary rounded-full animate-[bounce_0.8s_infinite]"></div>
<div class="h-14 w-1 bg-primary rounded-full animate-[bounce_1.1s_infinite]"></div>
</div>
</div>
</div>
<!-- Real-time Transcription -->
<div class="space-y-4 px-4">
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface leading-tight">
                    “I need to book a haircut with Julian this Saturday morning.”
                </h1>
<div class="flex items-center justify-center gap-2 text-primary">
<span class="material-symbols-outlined text-[18px]">mic_none</span>
<span class="font-label-caps text-label-caps tracking-widest">LISTENING</span>
</div>
</div>
</div>

<!-- Bottom Action Panel (Glassmorphism) -->

<nav class="hidden">

</nav>
<script>
        // Subtle micro-interaction for the orb to follow mouse slightly
        document.addEventListener('mousemove', (e) => {
            const orb = document.querySelector('.orb-glow');
            if (!orb) return;
            
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            
            orb.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Simulating the "Thinking" state transition
        setTimeout(() => {
            const statusText = document.querySelector('.font-label-caps.text-on-surface-variant');
            if(statusText) statusText.innerText = "Processing your request...";
        }, 2500);
    </script>
