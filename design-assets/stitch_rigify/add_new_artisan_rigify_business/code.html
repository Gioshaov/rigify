<script>
        // Simple day toggle interaction
        const dayButtons = document.querySelectorAll('.grid button[type="button"]');
        dayButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('bg-primary');
                if (isActive) {
                    btn.classList.remove('bg-primary', 'text-black', 'border-primary');
                    btn.classList.add('border-white/10', 'text-on-surface-variant');
                } else {
                    btn.classList.add('bg-primary', 'text-black', 'border-primary');
                    btn.classList.remove('border-white/10', 'text-on-surface-variant');
                }
            });
        });

        // Form submission prevent default for demo
        document.getElementById('staff-form').addEventListener('submit', (e) => {
