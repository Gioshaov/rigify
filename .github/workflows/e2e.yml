name: E2E

# Runs the Playwright suite on PRs into staging.
#
# Scope: excludes specs tagged `@db` — those need a seeded test database + users
# and are a documented follow-up (issue #99). Everything else (mocked or
# /dev/ui-harness specs) runs. New DB-free specs run automatically; new
# DB-touching specs must tag their describe `@db` to stay excluded until the
# follow-up wires a CI-reachable test DB + seed step.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SITE_PASSWORD                  — must match the gate the app enforces; without
#                                    it bypassSitePassword throws (test-helpers.ts).
#   NEXT_PUBLIC_SUPABASE_URL       — the app boots via `npm run dev` and its
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — middleware builds a Supabase client per
#                                    request, so both must be defined to start.

on:
  pull_request:
    branches: [staging]

jobs:
  playwright:
    name: Playwright (non-@db specs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E specs (excludes @db-tagged)
        # Playwright starts the app itself (webServer: npm run dev in
        # playwright.config.ts). Env scoped to this step only (least privilege).
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx playwright test --grep-invert "@db"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
